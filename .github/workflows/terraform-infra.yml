name: terraform-infra

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
      component:
        description: Which infrastructure component to deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - platform
          - portal
      action:
        description: Terraform action
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy
  push:
    branches:
      - main
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform-infra.yml"

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    env:
      ARM_CLIENT_ID: 3ebdf63b-b0bf-4c9e-b120-7d565a94239a
      ARM_SUBSCRIPTION_ID: 39023a16-af6f-4b68-8498-e36556540d33
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      TFSTATE_RESOURCE_GROUP: ${{ vars.TFSTATE_RESOURCE_GROUP }}
      TF_IN_AUTOMATION: "true"
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
      COMPONENT: ${{ github.event.inputs.component || 'all' }}
      ACTION: ${{ github.event.inputs.action || 'apply' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        run: |
          az login --service-principal \
            --username "${ARM_CLIENT_ID}" \
            --password "${ARM_CLIENT_SECRET}" \
            --tenant "${ARM_TENANT_ID}"
          az account set --subscription "${ARM_SUBSCRIPTION_ID}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Verify runner tools
        run: |
          terraform version
          terragrunt --version
          az version

      - name: Run Terragrunt
        working-directory: infra/terraform/live/${{ env.ENVIRONMENT }}
        run: |
          if [ "${COMPONENT}" = "all" ]; then
            if [ "${ACTION}" = "apply" ] || [ "${ACTION}" = "destroy" ]; then
              terragrunt run-all "${ACTION}" --terragrunt-non-interactive --auto-approve
            else
              terragrunt run-all "${ACTION}" --terragrunt-non-interactive
            fi
          else
            cd "${COMPONENT}"
            if [ "${ACTION}" = "apply" ] || [ "${ACTION}" = "destroy" ]; then
              terragrunt "${ACTION}" --terragrunt-non-interactive --auto-approve
            else
              terragrunt "${ACTION}" --terragrunt-non-interactive
            fi
          fi
