name: requestedenvironment-infra

on:
  workflow_dispatch:
    inputs:
      team_name:
        description: Team name
        required: true
      requested_environment:
        description: Requested environment
        required: true
        default: dev
      requested_cpu:
        description: Requested CPU
        required: true
        default: 500m
      requested_memory:
        description: Requested memory
        required: true
        default: 512Mi
      requested_image:
        description: Container image
        required: true
      app_version:
        description: Application version label
        required: true
        default: manual
      deployment_type:
        description: Requested AKS deployment type
        required: true
        default: aks-namespace-app
      action:
        description: Terraform action for the requested environment
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy

concurrency:
  group: requestedenvironment-${{ github.event.inputs.deployment_type || 'aks-namespace-app' }}-${{ github.event.inputs.team_name }}-${{ github.event.inputs.requested_environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
    env:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      TFSTATE_RESOURCE_GROUP: ${{ vars.TFSTATE_RESOURCE_GROUP }}
      TFSTATE_STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
      TFSTATE_CONTAINER: ${{ vars.TFSTATE_CONTAINER }}
      TEAM_NAME: ${{ github.event.inputs.team_name }}
      REQUESTED_ENVIRONMENT: ${{ github.event.inputs.requested_environment }}
      REQUESTED_CPU: ${{ github.event.inputs.requested_cpu }}
      REQUESTED_MEMORY: ${{ github.event.inputs.requested_memory }}
      REQUESTED_IMAGE: ${{ github.event.inputs.requested_image }}
      APP_VERSION: ${{ github.event.inputs.app_version }}
      DEPLOY_WORKLOAD: "false"
      DEPLOYMENT_TYPE: ${{ github.event.inputs.deployment_type || 'aks-namespace-app' }}
      ACTION: ${{ github.event.inputs.action || 'apply' }}
      COREAKS_ENVIRONMENT: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        run: |
          az login --service-principal --username "$env:ARM_CLIENT_ID" --password "$env:ARM_CLIENT_SECRET" --tenant "$env:ARM_TENANT_ID"
          az account set --subscription "$env:ARM_SUBSCRIPTION_ID"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Verify runner tools
        run: |
          $ErrorActionPreference = "Stop"
          $ProgressPreference = "SilentlyContinue"

          Write-Host "Checking terraform..."
          terraform version

          Write-Host "Checking terragrunt..."
          terragrunt --version

          Write-Host "Checking azure cli..."
          az --version

          Write-Host "Checking kubectl..."
          kubectl version --client=true --output=yaml

      - name: Get coreaks kubeconfig
        run: |
          $ErrorActionPreference = "Stop"
          $ProgressPreference = "SilentlyContinue"
          $coreAksDir = Join-Path $PWD "infra/terraform/live/$env:COREAKS_ENVIRONMENT/coreaks"
          Push-Location $coreAksDir
          $aksName = (terragrunt output -raw aks_name).Trim()
          $resourceGroup = (terragrunt output -raw resource_group_name).Trim()
          Pop-Location

          az aks get-credentials --resource-group $resourceGroup --name $aksName --overwrite-existing
          $clusterName = kubectl config view --minify -o "jsonpath={.clusters[0].name}"
          kubectl config set-cluster $clusterName --insecure-skip-tls-verify=true
          kubectl config unset "clusters.$clusterName.certificate-authority-data"
          Write-Host "Testing AKS connectivity with TLS verification temporarily bypassed..."
          kubectl get nodes

      - name: Validate requested image exists in ACR
        if: env.DEPLOY_WORKLOAD == 'true'
        run: |
          $ErrorActionPreference = "Stop"
          $ProgressPreference = "SilentlyContinue"

          $coreAksDir = Join-Path $PWD "infra/terraform/live/$env:COREAKS_ENVIRONMENT/coreaks"
          Push-Location $coreAksDir
          $acrName = (terragrunt output -raw acr_name).Trim()
          Pop-Location

          $imageRef = $env:REQUESTED_IMAGE.Trim()
          $registryAndPath, $tag = $imageRef -split ":", 2
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Requested image '$imageRef' must include an explicit tag."
          }

          $segments = $registryAndPath.Split("/")
          if ($segments.Length -lt 2) {
            throw "Requested image '$imageRef' must include a repository name."
          }

          $repository = ($segments[1..($segments.Length - 1)] -join "/")
          Write-Host ("Validating requested image '{0}:{1}' in ACR '{2}'..." -f $repository, $tag, $acrName)
          az acr repository show --name "$acrName" --image "$repository`:$tag" --output none
          Write-Host "Requested image is present in ACR."

      - name: Apply requested environment
        run: |
          if ($env:DEPLOYMENT_TYPE -eq "aks-namespace-app") {
            $env:REQUESTEDENVIRONMENT_MODULE_SOURCE = "../../modules/requestedenvironment"
          } else {
            throw "Unsupported deployment_type '$env:DEPLOYMENT_TYPE'. Add a module mapping in this workflow before using it."
          }

          $runnerDir = Join-Path $PWD "infra/terraform/live/team-runner"
          Push-Location $runnerDir
          terragrunt init --terragrunt-non-interactive -upgrade
          $stateEntries = terragrunt state list 2>$null
          $teamSlug = $env:TEAM_NAME.ToLower().Replace(" ", "-").Replace("_", "-").Replace("/", "-").Replace("\\", "-").Trim("-")
          $environmentSlug = $env:REQUESTED_ENVIRONMENT.ToLower().Replace(" ", "-").Replace("_", "-").Replace("/", "-").Replace("\\", "-").Trim("-")
          $namespace = "team-$teamSlug-$environmentSlug"
          $deploymentName = "starter-api"

          if (($env:DEPLOY_WORKLOAD -ne "true") -and ($stateEntries -contains "kubernetes_deployment.team")) {
            terragrunt state rm kubernetes_deployment.team
            $stateEntries = terragrunt state list 2>$null
          }

          if ($stateEntries -contains "kubernetes_deployment.team") {
            Write-Host "Removing legacy deployment state entry kubernetes_deployment.team..."
            terragrunt state rm kubernetes_deployment.team
            $stateEntries = terragrunt state list 2>$null
          }

          if (($env:DEPLOY_WORKLOAD -eq "true") -and -not ($stateEntries -contains "kubernetes_deployment_v1.team")) {
            $deploymentExists = $false
            kubectl get deployment $deploymentName -n $namespace --ignore-not-found | Out-Null
            if ($LASTEXITCODE -eq 0) {
              $deploymentExists = [bool](kubectl get deployment $deploymentName -n $namespace -o name 2>$null)
            }

            if ($deploymentExists) {
              Write-Host "Importing live deployment into kubernetes_deployment_v1.team..."
              terragrunt import kubernetes_deployment_v1.team "$namespace/$deploymentName"
            }
          }
          if ($env:ACTION -in @("apply", "destroy")) {
            terragrunt $env:ACTION --terragrunt-non-interactive --auto-approve
          } else {
            terragrunt $env:ACTION --terragrunt-non-interactive
          }
          Pop-Location
