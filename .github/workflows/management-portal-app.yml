name: management-portal-app

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: pwsh
    env:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      TFSTATE_RESOURCE_GROUP: ${{ vars.TFSTATE_RESOURCE_GROUP }}
      TFSTATE_STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
      TFSTATE_CONTAINER: ${{ vars.TFSTATE_CONTAINER }}
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        run: |
          az login --service-principal --username "$env:ARM_CLIENT_ID" --password "$env:ARM_CLIENT_SECRET" --tenant "$env:ARM_TENANT_ID"
          az account set --subscription "$env:ARM_SUBSCRIPTION_ID"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Verify runner tools
        run: |
          terraform version
          terragrunt --version
          az version
          Get-Command Compress-Archive

      - name: Ensure management portal infra
        working-directory: infra/terraform/live/${{ env.ENVIRONMENT }}/managementportal
        run: terragrunt apply --terragrunt-non-interactive --auto-approve

      - name: Deploy management portal package
        run: |
          $infraDir = Join-Path $PWD "infra/terraform/live/$env:ENVIRONMENT/managementportal"
          $portalDir = Join-Path $PWD "portal"
          $packagePath = Join-Path $env:RUNNER_TEMP "forge-managementportal.zip"

          Push-Location $infraDir
          $webAppName = (terragrunt output -raw web_app_name).Trim()
          $resourceGroup = (terragrunt output -raw resource_group_name).Trim()
          Pop-Location

          if (Test-Path $packagePath) {
            Remove-Item -LiteralPath $packagePath -Force
          }

          Compress-Archive -Path (Join-Path $portalDir "*") -DestinationPath $packagePath -Force

          az webapp deploy --resource-group $resourceGroup --name $webAppName --src-path $packagePath --type zip
          Write-Host "Management portal package deployed to $webAppName."
