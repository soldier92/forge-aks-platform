name: management-portal-app

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
    env:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      AKS_TEAM_TOKEN: ${{ secrets.AKS_TEAM_TOKEN }}
      TFSTATE_RESOURCE_GROUP: ${{ vars.TFSTATE_RESOURCE_GROUP }}
      TFSTATE_STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
      TFSTATE_CONTAINER: ${{ vars.TFSTATE_CONTAINER }}
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        run: |
          az login --service-principal --username "$env:ARM_CLIENT_ID" --password "$env:ARM_CLIENT_SECRET" --tenant "$env:ARM_TENANT_ID"
          az account set --subscription "$env:ARM_SUBSCRIPTION_ID"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Verify runner tools
        run: |
          terraform version
          terragrunt --version
          az version

      - name: Ensure management portal infra
        working-directory: infra/terraform/live/${{ env.ENVIRONMENT }}/managementportal
        run: terragrunt apply --terragrunt-non-interactive --auto-approve

      - name: Configure management portal container identity
        working-directory: infra/terraform/live/${{ env.ENVIRONMENT }}/managementportal
        run: |
          $resourceGroup = (terragrunt output -raw resource_group_name).Trim()
          $webAppName = (terragrunt output -raw web_app_name).Trim()
          $webConfigUri = "https://management.azure.com/subscriptions/$env:ARM_SUBSCRIPTION_ID/resourceGroups/$resourceGroup/providers/Microsoft.Web/sites/$webAppName/config/web?api-version=2023-12-01"

          $body = @{
            properties = @{
              acrUseManagedIdentityCreds = $true
              appCommandLine = ""
              healthCheckPath = "/health"
            }
          } | ConvertTo-Json -Compress

          $bodyPath = Join-Path $env:RUNNER_TEMP "managementportal-web-config-patch.json"
          Set-Content -Path $bodyPath -Value $body -Encoding ascii
          az rest --method PATCH --uri $webConfigUri --headers "Content-Type=application/json" --body "@$bodyPath"

      - name: Configure management portal dispatch secret
        working-directory: infra/terraform/live/${{ env.ENVIRONMENT }}/managementportal
        run: |
          if ([string]::IsNullOrWhiteSpace($env:AKS_TEAM_TOKEN)) {
            throw "Missing GitHub secret AKS_TEAM_TOKEN. Add a fine-grained PAT with Actions workflow dispatch access."
          }

          $resourceGroup = (terragrunt output -raw resource_group_name).Trim()
          $webAppName = (terragrunt output -raw web_app_name).Trim()

          az webapp config appsettings set `
            --resource-group $resourceGroup `
            --name $webAppName `
            --settings "AKS_TEAM_TOKEN=$env:AKS_TEAM_TOKEN"
