name: management-portal-site

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
      image_tag:
        description: Image tag for the management portal container
        required: true
        default: latest

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell
    env:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      TFSTATE_RESOURCE_GROUP: ${{ vars.TFSTATE_RESOURCE_GROUP }}
      TFSTATE_STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
      TFSTATE_CONTAINER: ${{ vars.TFSTATE_CONTAINER }}
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
      IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        run: |
          az login --service-principal --username "$env:ARM_CLIENT_ID" --password "$env:ARM_CLIENT_SECRET" --tenant "$env:ARM_TENANT_ID"
          az account set --subscription "$env:ARM_SUBSCRIPTION_ID"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Verify runner tools
        run: |
          terraform version
          terragrunt --version
          az version
          docker version
          docker buildx version

      - name: Resolve infra outputs
        run: |
          $coreAksDir = Join-Path $PWD "infra/terraform/live/$env:ENVIRONMENT/coreaks"
          $portalDir = Join-Path $PWD "infra/terraform/live/$env:ENVIRONMENT/managementportal"

          Push-Location $coreAksDir
          $acrName = (terragrunt output -raw acr_name).Trim()
          $acrLoginServer = (terragrunt output -raw acr_login_server).Trim()
          Pop-Location

          Push-Location $portalDir
          $webAppName = (terragrunt output -raw web_app_name).Trim()
          $resourceGroup = (terragrunt output -raw resource_group_name).Trim()
          $hostName = (terragrunt output -raw default_hostname).Trim()
          Pop-Location

          "ACR_NAME=$acrName" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ACR_LOGIN_SERVER=$acrLoginServer" | Out-File -FilePath $env:GITHUB_ENV -Append
          "WEB_APP_NAME=$webAppName" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RESOURCE_GROUP=$resourceGroup" | Out-File -FilePath $env:GITHUB_ENV -Append
          "WEB_APP_HOSTNAME=$hostName" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PORTAL_IMAGE=$acrLoginServer/managementportal:$env:IMAGE_TAG" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build and push management portal image
        run: |
          az acr login --name "$env:ACR_NAME"
          $builderName = "forgebuilder"
          $existingBuilder = docker buildx inspect $builderName 2>$null
          if ($LASTEXITCODE -ne 0) {
            docker buildx create --use --name $builderName --driver docker-container
          } else {
            docker buildx use $builderName
          }
          docker buildx build --platform linux/amd64 --tag "$env:PORTAL_IMAGE" "$PWD/portal" --push

      - name: Configure web app to use the container image
        run: |
          az webapp config container set `
            --resource-group "$env:RESOURCE_GROUP" `
            --name "$env:WEB_APP_NAME" `
            --container-image-name "$env:PORTAL_IMAGE" `
            --container-registry-url "https://$env:ACR_LOGIN_SERVER"

          $webConfigUri = "https://management.azure.com/subscriptions/$env:ARM_SUBSCRIPTION_ID/resourceGroups/$env:RESOURCE_GROUP/providers/Microsoft.Web/sites/$env:WEB_APP_NAME/config/web?api-version=2023-12-01"
          $body = @{ properties = @{ acrUseManagedIdentityCreds = $true } } | ConvertTo-Json -Compress
          az rest --method PATCH --uri $webConfigUri --headers "Content-Type=application/json" --body $body

      - name: Restart web app
        run: |
          az webapp log config --resource-group "$env:RESOURCE_GROUP" --name "$env:WEB_APP_NAME" --docker-container-logging filesystem
          az webapp restart --resource-group "$env:RESOURCE_GROUP" --name "$env:WEB_APP_NAME"

      - name: Health check
        run: |
          $url = "https://$env:WEB_APP_HOSTNAME/health"
          $attempts = 30

          Start-Sleep -Seconds 30

          for ($i = 1; $i -le $attempts; $i++) {
            try {
              Write-Host "Health check attempt $i/$attempts -> $url"
              $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 20
              if ($response.StatusCode -eq 200) {
                Write-Host "Management portal is healthy."
                exit 0
              }
            } catch {
              Write-Host "Health check attempt $i failed: $($_.Exception.Message)"
            }

            Start-Sleep -Seconds 10
          }

          throw "Management portal did not become healthy in time."

      - name: Collect failure diagnostics
        if: failure()
        run: |
          az webapp config container show --resource-group "$env:RESOURCE_GROUP" --name "$env:WEB_APP_NAME"
          az webapp show --resource-group "$env:RESOURCE_GROUP" --name "$env:WEB_APP_NAME"
          $logZip = Join-Path $env:RUNNER_TEMP "managementportal-logs.zip"
          $logDir = Join-Path $env:RUNNER_TEMP "managementportal-logs"
          az webapp log download --resource-group "$env:RESOURCE_GROUP" --name "$env:WEB_APP_NAME" --log-file $logZip

          if (Test-Path $logDir) {
            Remove-Item -LiteralPath $logDir -Recurse -Force
          }

          Expand-Archive -Path $logZip -DestinationPath $logDir -Force
          Get-ChildItem -Path $logDir -Recurse | Select-Object FullName

          $candidateLogs = @(
            (Join-Path $logDir "LogFiles\\docker\\default_docker.log"),
            (Join-Path $logDir "LogFiles\\docker\\docker.log"),
            (Join-Path $logDir "LogFiles\\eventlog.xml")
          )

          foreach ($logPath in $candidateLogs) {
            if (Test-Path $logPath) {
              Write-Host "===== $logPath ====="
              Get-Content -Path $logPath -Tail 200
            }
          }
